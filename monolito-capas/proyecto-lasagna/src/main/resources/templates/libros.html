<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Codigo Spaghetti</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #d9534f; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h1>Ingresa un libro que sea para el crecimiento personal</h1>
    <p>Hecho por Luis Luna</p>

    <form th:action="@{/libros/guardar}" method="post">
        <input type="text" name="titulo" placeholder="Título" required>
        <input type="text" name="autor" placeholder="Autor" required>
        <input type="number" name="anio" placeholder="Año" required>
        <br>
        <button type="submit">Añadir Libro</button>
    </form>

    <h3 th:if="${param.error}" style="color: red;">¡Error! El libro no corresponde a crecimiento personal</h3>

    <hr>
    <ul>
        <li th:each="libro : ${lista}">
            <strong th:text="${libro.titulo}"></strong> -
            <span th:text="${libro.autor}"></span>
            (<span th:text="${libro.anio}"></span>)
        </li>
    </ul>
</div>
</body>
</html>
